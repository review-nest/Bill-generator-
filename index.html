<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Review Nest Billing</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;background:#0b0b0b;font-family:Poppins;color:#fff}
.top{height:55px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#111;border-bottom:1px solid #222}
.brand{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px}
.menu{font-size:26px;cursor:pointer}

.loginBox{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;display:none;align-items:center;justify-content:center}
.loginCard{background:#1a1a1a;padding:20px;border-radius:20px;width:260px;text-align:center;position:relative}
.closeBtn{position:absolute;right:12px;top:8px;font-size:22px;cursor:pointer}

.card{width:82%;max-width:300px;margin:18px auto;background:#1a1a1a;padding:15px;border-radius:20px;box-shadow:0 0 25px rgba(0,0,0,.6)}
.title{text-align:center;font-size:15px;margin-bottom:10px}

label{font-size:11px;opacity:.7}
input{width:92%;padding:10px;border:none;border-radius:18px;margin:5px auto 10px;font-size:12px;display:block;background:#fff;color:#000}

.gen{width:92%;margin:auto;padding:10px;border:none;border-radius:22px;background:linear-gradient(45deg,#666,#222);color:#fff;cursor:pointer}

.invoice{background:#fff;color:#000;width:260px;margin:20px auto;padding:18px;border-radius:12px;font-size:13px;line-height:1.6}
.invoice h2{text-align:center;font-family:'Bebas Neue'}

.btnRow{width:260px;margin:8px auto;display:flex}
.action{flex:1;margin:0 4px;padding:8px;border:none;border-radius:16px;background:#111;color:#fff;cursor:pointer}

.notify{position:fixed;top:20px;right:-300px;background:#fff;color:#000;padding:12px 22px;border-radius:25px;box-shadow:0 10px 30px rgba(0,0,0,.5);transition:.5s}
.show{right:15px}
</style>
</head>

<body>

<div class="notify" id="note"></div>

<div class="loginBox" id="loginBox">
<div class="loginCard">
<div class="closeBtn" onclick="loginBox.style.display='none'">✖</div>
<h3>Login</h3>
<input id="mobile" placeholder="Mobile Number">
<input id="pin" placeholder="4 Digit PIN">
<button class="gen" onclick="login()">Login</button>
</div>
</div>

<div class="top">
<div class="brand">REVIEW NEST</div>
<div class="menu" onclick="loginBox.style.display='flex'">☰</div>
</div>

<div class="card">
<div class="title">Live Billing Statement</div>

<label>Member Name</label>
<input id="name" placeholder="Enter name">

<label>Total Live Unit</label>
<input id="unit" type="number" placeholder="Enter total unit">

<label>Live Rate (Auto Fixed)</label>
<input id="rate" readonly value="6">

<label>UPI ID</label>
<input id="upi" placeholder="example@upi">

<button class="gen" onclick="createBill()">Generate Bill</button>
</div>

<div id="output"></div>

<script>

let currentRate=6

function notify(t){
let note=document.getElementById("note")
note.innerText=t
note.classList.add("show")
setTimeout(()=>note.classList.remove("show"),2000)
}

let users={
"7307136991":{pin:"8090",rate:7},
"9811673657":{pin:"8858",rate:6.5},
"8527645047":{pin:"2007",rate:7},
"raunak262@fam":{pin:"9071",rate:7,upi:"raunak262@fam"},
"8307692600":{pin:"9812",rate:7.5}
}

function login(){
let m=document.getElementById("mobile").value
let p=document.getElementById("pin").value

if(users[m] && users[m].pin===p){
currentRate=users[m].rate
document.getElementById("rate").value=currentRate
document.getElementById("upi").value=users[m].upi||""
notify("Login Success • Rate ₹"+currentRate)
loginBox.style.display="none"
}else{
notify("Wrong Login Details")
}
}

function createBill(){
let n=document.getElementById("name").value
let u=document.getElementById("unit").value
let up=document.getElementById("upi").value

if(!n || !u){
notify("Fill all details")
return
}

let total=u*currentRate
let date=new Date().toLocaleDateString()
let id=Math.floor(Math.random()*99999)

document.getElementById("output").innerHTML=`

<div id="billImage" class="invoice">
<h2>REVIEW NEST</h2>
Invoice ID: ${id}<br>
Date: ${date}<br><br>
Client: ${n}<br>
Total Live Units: ${u}<br>
Approved Rate: ₹${currentRate}<br>
UPI ID: <span onclick="copyUPI('${up}')" style="color:blue;cursor:pointer">${up}</span><br>
-------------------------<br>
<b>Total Payable: ₹${total}</b><br><br>
Powered by Review Nest
</div>

<div class="btnRow">
<button class="action" onclick="shareTG('${n}','${u}','${up}','${total}')">Share</button>
<button class="action" onclick="downloadBill()">Download</button>
</div>
`

notify("Bill Generated")
}

function shareTG(n,u,up,t){
let date=new Date().toLocaleDateString()
let id=Math.floor(Math.random()*99999)

let msg=`REVIEW NEST - Billing Statement

Invoice ID: ${id}
Date: ${date}

Client: ${n}
Total Live Units: ${u}
Approved Rate: ₹${currentRate}
UPI ID: ${up}

-------------------------
Total Payable: ₹${t}

Powered by Review Nest`

// ⭐ YOUR TELEGRAM USERNAME LINK
window.open("https://t.me/Taskly_ai?text="+encodeURIComponent(msg),"_blank")

notify("Opening Telegram Chat")
}

function copyUPI(u){
navigator.clipboard.writeText(u)
notify("UPI Copied")
}

function downloadBill(){
html2canvas(document.getElementById("billImage")).then(canvas=>{
let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="ReviewBill.png"
a.click()
})
}

</script>

</body>
</html>
